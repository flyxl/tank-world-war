<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>坦克世界大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
      touch-action: none;
    }
    #loadingScreen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s;
    }
    #loadingScreen h1 {
      color: #e94560;
      font-family: 'Arial Black', sans-serif;
      font-size: 3rem;
      text-shadow: 0 0 20px rgba(233,69,96,0.5);
      margin-bottom: 2rem;
      letter-spacing: 0.3rem;
    }
    .loader {
      width: 200px; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      border-radius: 2px;
      transition: width 0.3s;
    }
    #loadingText {
      color: rgba(255,255,255,0.6);
      font-family: Arial, sans-serif;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    #portraitWarning {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    #portraitWarning .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: rotatePhone 2s ease-in-out infinite;
    }
    #portraitWarning h2 {
      color: #e94560;
      font-size: 1.4rem;
      margin-bottom: 0.8rem;
    }
    #portraitWarning p {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
    }
    @keyframes rotatePhone {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    @media screen and (max-width: 600px) and (orientation: portrait) and (hover: none) and (pointer: coarse) {
      #portraitWarning { display: flex !important; }
      #gameCanvas { display: none !important; }
      #loadingScreen { display: none !important; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="loadingScreen">
    <h1>坦克世界大战</h1>
    <div class="loader"><div class="loader-bar" id="loaderBar"></div></div>
    <p id="loadingText">正在加载...</p>
  </div>
  <div id="portraitWarning">
    <div class="icon">📱</div>
    <h2>请旋转设备</h2>
    <p>本游戏需要横屏模式才能游玩，请将设备旋转至横屏方向</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
